function calculateMoneyEnergy(){
const date = document.getElementById('birthdate').value;

if(!date){
alert('Пожалуйста, введите дату рождения');
return;
}

let numbers = date.replaceAll('-','').split('').map(Number);
let sum = numbers.reduce((a,b)=>a+b,0);

while(sum > 22){
sum = String(sum).split('').map(Number).reduce((a,b)=>a+b,0);
}

const energy = meanings[sum];

document.getElementById('energyTitle').innerText = energy.title;
document.getElementById('strongSide').innerText = energy.strong;
document.getElementById('weakSide').innerText = energy.weak;
document.getElementById('advice').innerText = energy.advice;

document.getElementById('result').style.display = 'block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
